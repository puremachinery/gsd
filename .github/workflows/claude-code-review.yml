name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    outputs:
      cleanup_started_at: ${{ steps.cleanup-window.outputs.started_at }}
      review_verified: ${{ steps.verify-review.outputs.review_verified }}
      workflow_changed: ${{ steps.workflow-change.outputs.changed }}
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Record cleanup window start time
        id: cleanup-window
        run: |
          # Safety buffer handles small clock skew between runner and GitHub timestamps.
          echo "started_at=$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Detect workflow self-change
        id: workflow-change
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const blocked = new Set([
              ".github/workflows/claude-code-review.yml",
              ".github/workflows/claude.yml",
            ]);
            const changed = files.some((file) => blocked.has(file.filename));
            core.setOutput("changed", changed ? "true" : "false");

      - name: Skip Claude review for workflow-change PR
        if: steps.workflow-change.outputs.changed == 'true'
        run: |
          echo "Skipping Claude review because this PR modifies Claude workflow files."
          echo "Anthropic requires the review workflow file to match the default branch content."

      - name: Checkout repository
        if: steps.workflow-change.outputs.changed != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        if: steps.workflow-change.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for:
            - correctness/regressions
            - security risks
            - maintainability concerns

            STRICT REVIEW POLICY
            1) Submit exactly one GitHub pull-request review per run.
            2) Inline comments are allowed ONLY for in-scope high/medium findings with concrete impact.
            3) Every finding must include:
               - severity (high/medium/low/info)
               - scope tag: in-scope or out-of-scope for this PR
               - concrete impact and concise fix
            4) Dedupe aggressively across pushes:
               - Before posting, fetch existing PR review threads/comments with gh api.
               - Do NOT post a new inline/root-cause comment if the same unresolved root cause is already present.
               - If a finding is still relevant but already called out, mention it only in the top-level review summary.
            5) Low findings:
               - Do NOT post inline.
               - Include them only in one top-level "Optional follow-ups (non-blocking)" section.
            6) Info findings:
               - Suppress entirely.
            7) Blocking policy:
               - Only in-scope high/medium findings are blocking for this PR.
               - Out-of-scope high/medium findings are advisory only.
            8) Consistency requirement:
               - If there are any non-info findings, do NOT say "LGTM."
               - "LGTM." is allowed only when there are zero findings after info suppression.
               - If there are no in-scope high/medium findings but there are advisory or low findings, start with "No high/medium findings. <N> low finding(s)." where <N> is the count of in-scope low findings and may be 0.
               - Never place high/medium findings inside "Optional follow-ups (non-blocking)".

            Output requirements:
            - Submit exactly one GitHub pull-request review per run.
            - Start the review body with exactly one of:
              - "Blocking findings present."
              - "No high/medium findings. <N> low finding(s)."
              - "LGTM."
            - If blocking findings exist, include a "### Blocking findings (required before merge)" section.
            - Keep out-of-scope high/medium findings in a separate "### Advisory findings (out-of-scope)" section.
            - Keep "### Optional follow-ups (non-blocking)" limited to low findings only.
            - Keep the review concise and avoid repetitive wording.
            - Use the GitHub Review API flow (pending review -> inline comments -> submit review).
            - Do not use issue-comment endpoints.
            - Do not leave final feedback only in tool output.
          claude_args: |
            --allowedTools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(git:*),Bash(rg:*),Bash(jq:*),Bash(cat:*),Bash(head:*),Bash(sed:*),Bash(echo:*),Bash(awk:*),Bash(wc:*),WebSearch"

      - name: Verify Claude review was published
        id: verify-review
        if: steps.workflow-change.outputs.changed != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RUN_STARTED_AT: ${{ steps.cleanup-window.outputs.started_at }}
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const startedAt = Date.parse(process.env.RUN_STARTED_AT || '');
            if (Number.isNaN(startedAt)) {
              core.setOutput('review_verified', 'false');
              core.setFailed(`Invalid RUN_STARTED_AT: ${process.env.RUN_STARTED_AT}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const knownClaudeAuthors = new Set(['claude', 'claude[bot]']);
            const isKnownClaudeBotAuthor = (user) => {
              const login = user?.login || '';
              const type = user?.type || '';
              return knownClaudeAuthors.has(login) && type === 'Bot';
            };

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const runReviews = reviews
              .filter((review) => {
                const submitted = Date.parse(review.submitted_at || '');
                return isKnownClaudeBotAuthor(review.user) && !Number.isNaN(submitted) && submitted >= startedAt;
              })
              .sort((a, b) => Date.parse(a.submitted_at || 0) - Date.parse(b.submitted_at || 0));

            core.setOutput('review_verified', runReviews.length > 0 ? 'true' : 'false');

            if (runReviews.length === 0) {
              core.setFailed('Claude review step finished but no claude-authored PR review was found for this run.');
              return;
            }

            core.info(`Found ${runReviews.length} claude-authored review(s) for this run. Cleanup will keep the newest one.`);

  cleanup-claude-stray-artifacts:
    name: Cleanup Claude review artifacts from this run
    needs: [claude-review]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Cleanup issue comments and claude-authored review spam
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RUN_STARTED_AT: ${{ needs.claude-review.outputs.cleanup_started_at }}
          REVIEW_VERIFIED: ${{ needs.claude-review.outputs.review_verified }}
          REVIEW_JOB_RESULT: ${{ needs.claude-review.result }}
          WORKFLOW_CHANGED: ${{ needs.claude-review.outputs.workflow_changed }}
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            try {
              if (process.env.WORKFLOW_CHANGED === 'true') {
                core.info('Skipping Claude cleanup because this PR modifies the Claude workflow itself.');
                return;
              }

              const startedAt = Date.parse(process.env.RUN_STARTED_AT || '');
              if (Number.isNaN(startedAt)) {
                core.warning(`Invalid RUN_STARTED_AT: ${process.env.RUN_STARTED_AT}`);
                return;
              }

              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issue_number = context.payload.pull_request.number;
              const strayAuthors = new Set(['claude', 'claude[bot]']);
              const isKnownClaudeBotAuthor = (user) => {
                const login = user?.login || '';
                const type = user?.type || '';
                return strayAuthors.has(login) && type === 'Bot';
              };

              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const strayIssueComments = issueComments.filter((c) => {
                const created = Date.parse(c.created_at || '');
                return isKnownClaudeBotAuthor(c.user) && !Number.isNaN(created) && created >= startedAt;
              });

              for (const c of strayIssueComments) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
              core.info(`Deleted ${strayIssueComments.length} stray issue comment(s).`);

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: issue_number,
                per_page: 100,
              });
              const runReviews = reviews
                .filter((r) => {
                  const submitted = Date.parse(r.submitted_at || '');
                  return isKnownClaudeBotAuthor(r.user) && !Number.isNaN(submitted) && submitted >= startedAt;
                })
                .sort((a, b) => Date.parse(a.submitted_at || 0) - Date.parse(b.submitted_at || 0));

              let keepReview = null;
              if (runReviews.length === 0) {
                if (process.env.REVIEW_VERIFIED === 'true' || process.env.REVIEW_JOB_RESULT === 'success') {
                  core.warning('Expected at least one claude-authored PR review in this run, found none during cleanup.');
                } else {
                  core.info('No claude-authored PR review found during cleanup because the main review job already failed before verification completed.');
                }
              } else {
                keepReview = runReviews[runReviews.length - 1];
              }

              const strayReviews = keepReview ? runReviews.filter((r) => r.id !== keepReview.id) : [];

              for (const r of strayReviews) {
                try {
                  await github.graphql(
                    `mutation($subjectId:ID!) {
                      minimizeComment(input:{subjectId:$subjectId, classifier:OUTDATED}) {
                        minimizedComment { isMinimized }
                      }
                    }`,
                    { subjectId: r.node_id },
                  );
                } catch (err) {
                  core.warning(`Failed to minimize review ${r.id}: ${err.message}`);
                }
              }
              if (keepReview) {
                core.info(`Kept review ${keepReview.id} and minimized ${strayReviews.length} stray claude-authored review(s).`);
              } else {
                core.info(`No kept review for this run; minimized ${strayReviews.length} stray claude-authored review(s).`);
              }

              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: issue_number,
                per_page: 100,
              });

              const strayReviewComments = reviewComments.filter((c) => {
                const created = Date.parse(c.created_at || '');
                return isKnownClaudeBotAuthor(c.user)
                  && !Number.isNaN(created)
                  && created >= startedAt
                  && (!keepReview || c.pull_request_review_id !== keepReview.id);
              });

              for (const c of strayReviewComments) {
                try {
                  await github.graphql(
                    `mutation($subjectId:ID!) {
                      minimizeComment(input:{subjectId:$subjectId, classifier:OUTDATED}) {
                        minimizedComment { isMinimized }
                      }
                    }`,
                    { subjectId: c.node_id },
                  );
                } catch (err) {
                  core.warning(`Failed to minimize review comment ${c.id}: ${err.message}`);
                }
              }
              core.info(`Minimized ${strayReviewComments.length} stray claude-authored review comment(s).`);
            } catch (err) {
              const status = err?.status || err?.response?.status;
              if ([500, 502, 503, 504].includes(status)) {
                core.warning(`Cleanup skipped due to transient GitHub API error (${status}): ${err.message}`);
                return;
              }
              throw err;
            }
