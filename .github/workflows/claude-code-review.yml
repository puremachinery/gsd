name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to reference in the prompt during manual auth smoke runs"
        required: false
        type: string
        default: ""

concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review-readonly:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
      id-token: write
    steps:
      - name: Run Claude auth smoke with read-only permissions
        id: claude-review
        uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}

            This is an auth smoke test for the Claude GitHub Action.
            Respond with exactly AUTH_OK.

  claude-review-write:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Run Claude auth smoke with write permissions
        id: claude-review
        uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}

            This is an auth smoke test for the Claude GitHub Action.
            Respond with exactly AUTH_OK.
